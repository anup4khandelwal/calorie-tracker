# XcodeGen manifest — run `xcodegen generate` (brew install xcodegen) to produce Mise.xcodeproj.
name: Mise
options:
  bundleIdPrefix: com.anup4khandelwal
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "5.10"
    TARGETED_DEVICE_FAMILY: "1"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
targets:
  Mise:
    type: application
    platform: iOS
    sources:
      - path: Mise
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.anup4khandelwal.mise
        INFOPLIST_KEY_CFBundleDisplayName: Mise
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIUserInterfaceStyle: Dark
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: YES
        SWIFT_STRICT_CONCURRENCY: minimal
        CODE_SIGN_STYLE: Automatic
